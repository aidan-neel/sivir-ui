name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify source and packed consumer
    runs-on: ubuntu-latest
    env:
      LEFTHOOK: 0
      TURBO_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Dependency audit
        run: bun audit

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run check

      - name: Test (unit + ssr)
        run: bun --filter='docs' run test:ci

      - name: Test (registry)
        run: bun --filter='registry' run test

      - name: Test (sivir package)
        run: bun --filter='@sivir/ui' run test

      - name: Build
        run: bun run build

      - name: Build standalone docs deployment
        run: DOCS_ADAPTER=node bun --filter='docs' run build

      - name: Verify standalone docs handler has no runtime dependencies
        run: |
          runtime_dir=$(mktemp -d)
          cp -R apps/docs/build "$runtime_dir/build"
          cp package.json "$runtime_dir/package.json"
          cd "$runtime_dir"
          node -e "import('./build/handler.js')"

      - name: Test CLI in a fresh consumer
        run: bun --filter='@sivir/ui' run sandbox

      - name: Verify packed package in a fresh SvelteKit consumer
        run: bun --filter='@sivir/ui' run verify:artifact

      - name: Verify CLI source-copy from retained tarball
        run: bun --filter='@sivir/ui' run verify:cli-artifact
