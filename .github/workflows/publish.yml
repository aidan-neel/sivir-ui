name: Publish @sivir/ui

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish (for example v0.1.0)
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Verify and publish exact package artifact
    runs-on: ubuntu-latest
    env:
      LEFTHOOK: 0
      TURBO_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout release
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup npm registry
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Dependency audit
        run: bun audit

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          node -e "const p=require('./packages/sivir/package.json'); const expected='v'+p.version; if(process.env.RELEASE_TAG!==expected){ console.error('Release tag must be '+expected); process.exit(1) }"

      - name: Install Playwright Chromium
        # Keep the browser binary aligned with the Playwright version pinned in
        # bun.lock; resolving a different CLI version can install the wrong build.
        run: |
          PW_VERSION=$(basename "$(ls -d node_modules/.bun/playwright@* | head -1)" | cut -d'@' -f2)
          echo "Installing Playwright $PW_VERSION browsers"
          bunx "playwright@${PW_VERSION}" install --with-deps chromium

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run check

      - name: Test (unit + ssr)
        run: bun --filter='docs' run test:ci

      - name: Test (registry)
        run: bun --filter='registry' run test

      - name: Test (sivir package)
        run: bun --filter='@sivir/ui' run test

      - name: Test (browser)
        run: bun --filter='docs' run test:browser

      - name: Build workspace
        run: bun run build

      - name: Build standalone docs deployment
        run: DOCS_ADAPTER=node bun --filter='docs' run build

      - name: Verify standalone docs handler has no runtime dependencies
        run: |
          runtime_dir=$(mktemp -d)
          cp -R apps/docs/build "$runtime_dir/build"
          cp package.json "$runtime_dir/package.json"
          cd "$runtime_dir"
          node -e "import('./build/handler.js')"

      - name: Test CLI in a fresh consumer
        run: bun --filter='@sivir/ui' run sandbox

      - name: Pack and verify fresh SvelteKit consumer
        run: bun --filter='@sivir/ui' run verify:artifact

      - name: Verify CLI source-copy from retained tarball
        run: bun --filter='@sivir/ui' run verify:cli-artifact

      - name: Publish verified tarball
        run: npm publish packages/sivir/.release/*.tgz --access public --provenance --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
