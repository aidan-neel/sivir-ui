name: Publish @sivir/ui

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish (for example v0.1.0)
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish package to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup npm registry
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          node -e "const p=require('./packages/sivir/package.json'); const expected='v'+p.version; if(process.env.RELEASE_TAG!==expected){ console.error('Release tag must be '+expected); process.exit(1) }"

      - name: Validate and build package
        run: |
          bun --filter '@sivir/ui' run check
          bun --filter '@sivir/ui' run test
          bun --filter '@sivir/ui' run build

      - name: Verify package contents
        working-directory: packages/sivir
        run: npm pack --dry-run

      - name: Publish
        working-directory: packages/sivir
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
