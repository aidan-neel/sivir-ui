name: Publish UI

# Publishes @silk/ui to npm when a GitHub release is published.
# Tag the release `ui-v<version>`, matching the version in
# packages/silk/package.json. Requires the NPM_TOKEN repository secret.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    name: Publish @silk/ui to npm
    # Only act on UI releases (ui-* tags) or manual dispatch; @silk/cli
    # releases are handled by publish-cli.yml.
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref_name, 'ui-')
    runs-on: ubuntu-latest
    env:
      LEFTHOOK: 0
      TURBO_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node (npm registry auth)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        run: |
          version=$(node -p "require('./packages/silk/package.json').version")
          tag="${GITHUB_REF_NAME#ui-}"
          tag="${tag#v}"
          if [ "$tag" != "$version" ]; then
            echo "release tag $GITHUB_REF_NAME does not match @silk/ui version $version" >&2
            exit 1
          fi

      - name: Typecheck
        run: bun --filter='@silk/ui' run check

      - name: Build
        run: bun --filter='@silk/ui' run build

      - name: Publish to npm
        working-directory: packages/silk
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
