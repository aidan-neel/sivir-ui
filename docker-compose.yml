# Postgres lives on Supabase. The registry's `env_file` pulls DATABASE_URL +
# DIRECT_URL out of registry/.env. See registry/README.md for the URL formats.

services:
  registry:
    build: ./registry
    restart: unless-stopped
    # Loads DATABASE_URL + DIRECT_URL straight from registry/.env so we don't
    # need a separate root-level .env or exported shell vars.
    env_file:
      - registry/.env
    environment:
      PORT: "4100"
    ports:
      - "4100:4100"
